kind = "web"
previewPath = "/"
title = "Kalapi Restaurant"
version = "1.0.0"
id = "artifacts/kalapi-restaurant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19814
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/kalapi-restaurant run dev"

[services.env]
PORT = "19814"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/kalapi-restaurant", "run", "build"]
publicDir = "artifacts/kalapi-restaurant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
